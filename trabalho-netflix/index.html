<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Netflix - Quem está assistindo?</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo">POKEFLIX</div>
</header>

<main>
  <h1>Who's watching?</h1>

  <div class="profiles">
    <div class="profile">
      <div class="avatar avatar-pikachu">
        <img src="./img/images.jfif" alt="Pikachu">
      </div>
      <span>Pikachu</span>
    </div>

    <div class="profile">
      <div class="avatar avatar-gengar">
        <img src="./img/images (1).jfif" alt="Gengar">
      </div>
      <span>Gengar</span>
    </div>

    <div class="profile">
      <div class="avatar avatar-squirtle">
        <img src="./img/images (2).jfif" alt="Squirtle">
      </div>
      <span>Squirtle</span>
    </div>

    <div class="profile">
      <div class="avatar avatar-charmander">
        <img src="./img/images.png" alt="Charmander">
      </div>
      <span>Charmander</span>
    </div>

    <div class="profile add-profile">
      <div class="avatar">
        <img src="./img/images (1).png" alt="Adicionar perfil">
      </div>
      <span>Adicionar Perfil</span>
    </div>
  </div>

  <button class="manage-btn">MANAGE PROFILES</button>
</main>

</body>
</html>
